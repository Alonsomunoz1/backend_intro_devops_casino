name: Backend CI/CD Pipeline

on:
  push:
    branches:
      - deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Construir imagen Docker
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/vidal-casino-backend:latest .

      - name: Login en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Subir imagen a Docker Hub
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/vidal-casino-backend:latest

      - name: Desplegar en AWS EC2 (Backend)
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.AWS_BACKEND_IP }}
          username: ec2-user
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            sudo dnf install -y docker
            sudo systemctl start docker
            sudo usermod -aG docker ec2-user
            sudo docker network create casino_network || true
            sudo docker run -d --name casino_db --network casino_network -e POSTGRES_USER=casino_user -e POSTGRES_PASSWORD=casino_password -e POSTGRES_DB=vidal_casino -v postgres_data:/var/lib/postgresql/data -p 5432:5432 postgres:15-alpine || true
            sudo docker stop casino_backend || true
            sudo docker rm casino_backend || true
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/vidal-casino-backend:latest
            sudo docker run -d --name casino_backend --network casino_network -p 3000:3000 -e PORT=3000 -e DB_HOST=casino_db -e DB_USER=casino_user -e DB_PASSWORD=casino_password -e DB_NAME=vidal_casino -e DB_PORT=5432 -e JWT_SECRET=ReyArturoSecretKey123! ${{ secrets.DOCKERHUB_USERNAME }}/vidal-casino-backend:latest
