# ============================================================
# casino-backend  -  Deployment + Service (ClusterIP, interno)
# Emite el JWT (HS256); los demás backends lo validan.
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: casino-backend
  labels:
    app: casino-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: casino-backend
  template:
    metadata:
      labels:
        app: casino-backend
    spec:
      containers:
        - name: casino-backend
          image: 843084666157.dkr.ecr.us-east-1.amazonaws.com/casino-backend:latest
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: CORS_ORIGIN
              value: "*"
            - name: DB_HOST
              valueFrom: { secretKeyRef: { name: casino-secrets, key: DB_HOST } }
            - name: DB_PORT
              valueFrom: { secretKeyRef: { name: casino-secrets, key: DB_PORT } }
            - name: DB_USER
              valueFrom: { secretKeyRef: { name: casino-secrets, key: DB_USER } }
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: casino-secrets, key: DB_PASSWORD } }
            - name: DB_NAME
              valueFrom: { secretKeyRef: { name: casino-secrets, key: DB_NAME } }
            - name: JWT_SECRET
              valueFrom: { secretKeyRef: { name: casino-secrets, key: JWT_SECRET } }
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet: { path: /readyz, port: 3000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /livez, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: casino-backend
  labels:
    app: casino-backend
spec:
  type: ClusterIP
  selector:
    app: casino-backend
  ports:
    - port: 3000
      targetPort: 3000
